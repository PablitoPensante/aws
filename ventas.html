<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cuentas | Historial</title>
  <link rel="stylesheet" href="ventas.css" />
</head>
<body>
  <header class="sales-header">
    <div>
      <h1>Historial de cuentas</h1>
      <p>Consulta las cuentas liquidadas durante la demo.</p>
    </div>
    <nav class="sales-actions" aria-label="Navegacion principal">
      <a class="btn btn-primary" href="pos.html?v=2">Abrir Caja</a>
      <a class="btn btn-secondary" href="productos.html">Inventario</a>
      <a class="btn btn-secondary" href="cuadre.html">Cierre</a>
      <button id="reload-btn" class="btn btn-secondary" type="button">Recargar</button>
      <button id="logout-btn" class="btn btn-danger" type="button">Cerrar sesion</button>
    </nav>
  </header>

  <main class="sales-main">
    <section class="summary-grid" aria-label="Resumen de ventas">
      <article class="summary-card">
        <span class="summary-card__label">Cuentas</span>
        <strong id="summary-count">0</strong>
      </article>
      <article class="summary-card">
        <span class="summary-card__label">Total liquidado</span>
        <strong id="summary-total">$0</strong>
      </article>
      <article class="summary-card">
        <span class="summary-card__label">Artículos</span>
        <strong id="summary-items">0</strong>
      </article>
    </section>

    <section class="sales-panel">
      <div class="panel-heading">
        <h2>Últimas cuentas</h2>
        <span id="mode-label">Modo local</span>
      </div>
      <div id="message" class="message" role="status" aria-live="polite"></div>
      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th>Cuenta</th>
              <th>Fecha</th>
              <th>Cajera</th>
              <th>Articulos</th>
              <th>Subtotal</th>
              <th>Descuento</th>
              <th>Total</th>
              <th>Estado</th>
            </tr>
          </thead>
          <tbody id="sales-body">
            <tr>
              <td colspan="8">Cargando cuentas...</td>
            </tr>
          </tbody>
        </table>
      </div>
    </section>
  </main>

  <script src="config.js"></script>
  <script type="module" src="ventas.js"></script>
</body>
</html>
