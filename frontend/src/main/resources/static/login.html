<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Acceso | Sistema POS</title>
    <link rel="stylesheet" href="/login.css" />
</head>
<body class="auth-body">
<main class="login-screen" aria-label="Inicio de sesion">
    <section class="login-panel">
        <div class="avatar" aria-hidden="true">
            <span class="avatar-head"></span>
            <span class="avatar-body"></span>
        </div>

        <h1>Sistema POS</h1>
        <p class="login-subtitle">Inventario, ventas y cierre de caja</p>

        <div id="loginMessage"></div>

        <form id="loginForm" class="login-form" autocomplete="off">
            <label class="sr-only" for="usuario">Usuario</label>
            <input type="text" id="usuario" placeholder="Usuario" required autofocus />

            <label class="sr-only" for="contrasena">Contraseña</label>
            <div class="password-row">
                <input type="password" id="contrasena" placeholder="Contraseña" required />
                <button type="submit" class="login-submit" aria-label="Entrar">→</button>
            </div>
        </form>
    </section>
</main>

<script src="/login.js"></script>
</body>
</html>
